aid: defense-threat-reduction-agency
name: Defense Threat Reduction Agency
description: >-
  The Defense Threat Reduction Agency (DTRA) is the U.S. Department of
  Defense combat support agency that counters and deters weapons of mass
  destruction (WMD) and improvised threats. DTRA leads the chemical,
  biological, radiological, nuclear, and high-yield explosive (CBRNE)
  mission for DoD and supports the Cooperative Threat Reduction (CTR)
  Program with partner nations. Public-facing surfaces include the DTRA
  website, the DTRA Information Analysis Center (DTRIAC) for technical
  reports, the DTRA Mission Network public information, and small-business
  and broad-agency-announcement procurement portals. DTRA does not publish
  a general-purpose developer API; partner systems interact through
  controlled, government-to-government channels.
